<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jameya Marketplace API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css">
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .info .title { font-size: 2.2em; }
    .swagger-ui .info hgroup.main a { display: none; }
    .custom-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 20px 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .custom-header h1 { margin: 0 0 8px 0; font-size: 28px; font-weight: 700; }
    .custom-header p { margin: 0; opacity: 0.8; font-size: 14px; }
    .custom-header .badges { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .custom-header .badge {
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div class="custom-header">
    <h1>🏦 Jameya Marketplace API</h1>
    <p>Production-ready backend for collaborative savings groups — NestJS + PostgreSQL + Redis + BullMQ + Stripe</p>
    <div class="badges">
      <span class="badge">OpenAPI 3.0</span>
      <span class="badge">2-Phase Reservation</span>
      <span class="badge">Concurrency Safe</span>
      <span class="badge">Idempotent</span>
      <span class="badge">Marketplace Ranking</span>
    </div>
  </div>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js"></script>
  <script>
    // Load the swagger.json from same directory
    window.onload = function() {
      SwaggerUIBundle({
        url: './swagger.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: 'StandaloneLayout',
        docExpansion: 'list',
        filter: true,
        showRequestDuration: true,
        syntaxHighlight: {
          activate: true,
          theme: 'monokai',
        },
        defaultModelsExpandDepth: 2,
        defaultModelExpandDepth: 2,
        displayRequestDuration: true,
        tryItOutEnabled: true,
      });
    };
  </script>
</body>
</html>
